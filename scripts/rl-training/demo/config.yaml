run:
  name: rl_demo
  seed: 42
backend:
  name: trl_grpo
model:
  path: models/sft_models/final/demo_sft_final
  reference_path: models/sft_models/final/demo_sft_final
  dtype: bf16
  attn_implementation: flash_attention_2
data:
  train_path: data/processed/rl/demo/train.jsonl
  val_path: data/processed/rl/demo/val.jsonl
  max_prompts: 500
  max_prompt_len: 1024
  max_new_tokens: 1024
rl:
  algorithm: grpo
  generations_per_prompt: 2
  learning_rate: 1.0e-6
  kl_coef: 0.005
  temperature: 0.8
  top_p: 0.95
  epochs: 1
  batch_prompts_per_step: 8
reward:
  correctness_weight: 1.0
  format_weight: 0.1
  repetition_penalty: 0.1
  length_penalty: 0.05
output:
  checkpoint_dir: models/rl_models/training_checkpoints/demo
  final_dir: models/rl_models/final/demo_rl_final
  log_dir: models/rl_models/training_checkpoints/demo/logs
  eval_dir: models/rl_models/training_checkpoints/demo/evals
