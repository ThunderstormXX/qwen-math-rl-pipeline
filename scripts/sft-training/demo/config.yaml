run:
  name: sft_demo
  seed: 42
backend:
  name: trl_sft
model:
  path: models/base_models/Qwen3.5-2B-Base
  dtype: bf16
  attn_implementation: flash_attention_2
peft:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
data:
  train_path: data/processed/sft/demo/train.jsonl
  val_path: data/processed/sft/demo/val.jsonl
  max_examples: 1000
  max_seq_len: 1024
  packing: false
training:
  epochs: 1
  learning_rate: 1.5e-5
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  eval_strategy: "no"
  save_strategy: "no"
  per_device_eval_batch_size: 1
output:
  checkpoint_dir: models/sft_models/training_checkpoints/demo
  final_dir: models/sft_models/final/demo_sft_final
  log_dir: models/sft_models/training_checkpoints/demo/logs
  eval_dir: models/sft_models/training_checkpoints/demo/evals
