run:
  name: sft_exp_001
  seed: 42
backend:
  name: trl_sft
model:
  path: models/base_models/Qwen3.5-2B-Base
  dtype: bf16
  attn_implementation: flash_attention_2
data:
  train_path: data/processed/sft/exp_001/train.jsonl
  val_path: data/processed/sft/exp_001/val.jsonl
  max_examples: 100000
  max_seq_len: 4096
  packing: true
training:
  epochs: 1
  learning_rate: 1.5e-5
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 16
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
output:
  checkpoint_dir: models/sft_models/training_checkpoints/exp_001
  final_dir: models/sft_models/final/exp_001_sft_final
  log_dir: models/sft_models/training_checkpoints/exp_001/logs
  eval_dir: models/sft_models/training_checkpoints/exp_001/evals
